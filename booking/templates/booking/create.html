{% extends "core/base.html" %}

{% block title %}Оформление заявки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body">

                <h3 class="mb-4 text-center">Новая заявка</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-success w-100">
                        Отправить заявку
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
