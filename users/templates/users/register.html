{% extends "core/base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm bento-card">
            <div class="card-body">

                <h3 class="text-center mb-4 bento-heading">Регистрация</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Зарегистрироваться
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Уже есть аккаунт?
                    <a href="{% url 'users:login' %}">Войти</a>
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
